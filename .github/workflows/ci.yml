name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        laravel: ['10.*', '11.*', '12.*']
        exclude:
          # Laravel 10 predates official PHP 8.4 support.
          - php: '8.4'
            laravel: '10.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          ini-values: memory_limit=-1
          coverage: none

      # Composer 2.10 refuses to install dependency versions carrying a security
      # advisory. Laravel 10/11 all carry PKSA-mdq4-51ck-6kdq (a framework-level
      # advisory for downstream apps, not this SDK), which would make those
      # matrix rows unresolvable. We test compatibility across our whole support
      # range, so disable the install-time block for the matrix.
      - name: Allow advisory-affected framework versions in the matrix
        run: composer config --global policy.advisories.block false || true

      - name: Constrain Laravel version
        run: composer require "illuminate/support:${{ matrix.laravel }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: composer lint

      - name: Static analysis
        run: composer analyse

      - name: Run tests
        run: composer test

  # Directly addresses the claim that the package fails on PHP 8.4 + Composer 2.9.7.
  php84-composer297:
    name: PHP 8.4 + Composer 2.9.7 (compatibility proof)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4 with Composer 2.9.7
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          ini-values: memory_limit=-1
          coverage: none
          tools: composer:2.9.7

      - name: Allow advisory-affected framework versions (no-op if unsupported)
        run: composer config --global policy.advisories.block false || true

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: composer lint

      - name: Static analysis
        run: composer analyse

      - name: Run tests
        run: composer test
